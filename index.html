        // --- DATA AWAL ---
        const INITIAL_PLAYERS = [

          { "id": "p10", "name": "Fransisco Moy", "whatsapp": "+62 813-7223-7600", "role": "player", "type": "monthly", "fee": 0, "payments": {"2026-06": false, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p12", "name": "Eding Sembiring", "whatsapp": "+62 813-8868-9272", "role": "player", "type": "monthly", "fee": 0, "payments": {"2026-06": false, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p13", "name": "Julianto Sinaga", "whatsapp": "+62 815-3000-159", "role": "player", "type": "monthly", "fee": 0, "payments": {"2026-06": false, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p14", "name": "Alex Sibarani", "whatsapp": "+62 812-6360-4429", "role": "player", "type": "monthly", "fee": 0, "payments": {"2026-06": false, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p15", "name": "Haposan87", "whatsapp": "+62 895-4102-69007", "role": "admin", "type": "monthly", "fee": 0, "payments": {"2026-06": false, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } }
        ];

        const INITIAL_TRANSACTIONS = [
          { "id": "t1", "type": "credit", "category": "iuran", "amount": 550000, "description": "Iuran bulan Juni 2026", "date": "2026-06-08", "note": "Manual - Kas Masuk", "hasReceipt": false },
          { "id": "t2", "type": "debit", "category": "sewa", "amount": 400000, "description": "Bayar sewa lapangan bulan Juni 2026", "date": "2026-06-08", "note": "Slip Transfer", "hasReceipt": true },
          { "id": "t3", "type": "debit", "category": "shuttlecock", "amount": 260000, "description": "Beli bola 2 tabung, merk AW", "date": "2026-06-08", "note": "Kuitansi Fisik", "hasReceipt": true }
        ];

        const todayStr = new Date().toISOString().slice(0, 10);
        const INITIAL_SESSIONS = [
          { "id": "s1", "date": todayStr, "day": "Selasa", "location": "Sport Hill Arena, Batam", "court": "Court 10", "time": "19:00 - 21:00", "isClosed": false, "rsvps": {} }
        ];

        const INITIAL_TACTICAL = [
            { id: 'tp1', label: 'T1-A', x: 75, y: 150, color: '#3B82F6' },
            { id: 'tp2', label: 'T1-B', x: 75, y: 250, color: '#3B82F6' },
            { id: 'tp3', label: 'T2-A', x: 225, y: 150, color: '#EF4444' },
            { id: 'tp4', label: 'T2-B', x: 225, y: 250, color: '#EF4444' },
        ];

        const loadInitialData = () => {
            try { 
              const local = localStorage.getItem(LOCAL_STORAGE_KEY); 
              if (local) return JSON.parse(local); 
            } catch (e) { console.error("Gagal load data lokal", e); }
            return { players: INITIAL_PLAYERS, sessions: INITIAL_SESSIONS, sessionHistory: [], transactions: INITIAL_TRANSACTIONS, matches: [], tacticalPlayers: INITIAL_TACTICAL, updatedAt: 0 };
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          const initialData = loadInitialData();
          const [players, setPlayers] = useState(initialData.players);
          const [sessions, setSessions] = useState(initialData.sessions);
          const [sessionHistory, setSessionHistory] = useState(initialData.sessionHistory || []);
          const [transactions, setTransactions] = useState(initialData.transactions);
          const [matches, setMatches] = useState(initialData.matches || []);
          const [tacticalPlayers, setTacticalPlayers] = useState(initialData.tacticalPlayers || INITIAL_TACTICAL);

          const stateRef = useRef(initialData);
          const localUpdatedAt = useRef(initialData.updatedAt || 0);
          const canvasRef = useRef(null);

          // State Anggota & Edit Anggota
          const [editPlayerId, setEditPlayerId] = useState(null);
          const [pName, setPName] = useState(''); const [pRole, setPRole] = useState('player'); const [pWa, setPWa] = useState('');
          const [pType, setPType] = useState('monthly'); const [pFee, setPFee] = useState('100000');

          // State Kas & Edit Kas
          const [editTxId, setEditTxId] = useState(null);
          const [txCategory, setTxCategory] = useState('iuran'); const [txType, setTxType] = useState('credit');
          const [txAmount, setTxAmount] = useState(''); const [txDesc, setTxDesc] = useState('');
          const [txMethod, setTxMethod] = useState('manual'); const [receiptName, setReceiptName] = useState('');

          // State Scoreboard
          const [teamA, setTeamA] = useState(['', '']);
          const [teamB, setTeamB] = useState(['', '']);
          const [sets, setSets] = useState([{a:0, b:0}, {a:0, b:0}, {a:0, b:0}]);

          const [notification, setNotification] = useState(null);
          const [workspaceUrl, setWorkspaceUrl] = useState('');
          const [user, setUser] = useState(null);
          const [cloudStatus, setCloudStatus] = useState('pending'); 

          const showToast = (message, type = 'info') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3500);
          };

          const persistData = (updatedFields) => {
            const newTimestamp = Date.now();
            const payload = { 
                players: stateRef.current.players, sessions: stateRef.current.sessions, sessionHistory: stateRef.current.sessionHistory,
                transactions: stateRef.current.transactions, matches: stateRef.current.matches, 
                tacticalPlayers: stateRef.current.tacticalPlayers, ...updatedFields, updatedAt: newTimestamp 
            };
            stateRef.current = payload; localUpdatedAt.current = newTimestamp;
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(payload));

            if (cloudStatus === 'connected' && workspaceUrl && user) {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(workspaceUrl).set(payload).catch(err => console.error(err));
            }
          };

          useEffect(() => {
            auth.signInAnonymously().catch(() => setCloudStatus('error_firestore'));
            const unsubAuth = auth.onAuthStateChanged(currentUser => { if (currentUser) setUser(currentUser); });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!user) return;
            const params = new URLSearchParams(window.location.search);
            const activeRoomId = params.get('workspace') || 'DEFAULT_ROOM';
            setWorkspaceUrl(activeRoomId);
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(activeRoomId);
            
            const unsubFirestore = roomRef.onSnapshot(doc => {
              if (doc.exists) {
                const cloudData = doc.data();
                if (cloudData.updatedAt > localUpdatedAt.current) {
                  localUpdatedAt.current = cloudData.updatedAt; stateRef.current = cloudData;
                  setPlayers(cloudData.players || INITIAL_PLAYERS); setSessions(cloudData.sessions || INITIAL_SESSIONS); 
                  setSessionHistory(cloudData.sessionHistory || []); setTransactions(cloudData.transactions || INITIAL_TRANSACTIONS); 
                  setMatches(cloudData.matches || []); setTacticalPlayers(cloudData.tacticalPlayers || INITIAL_TACTICAL);
                  localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cloudData));
                }
              } else { persistData({}); }
              setCloudStatus('connected');
            }, () => setCloudStatus('error_firestore'));
            return () => unsubFirestore();
          }, [user]);

          // Taktikal Board
          useEffect(() => { if (activeTab === 'tactical') redrawCanvas(); }, [activeTab, tacticalPlayers]);
          const redrawCanvas = () => {
            const cv = canvasRef.current; if (!cv) return;
            const ctx = cv.getContext('2d'); ctx.fillStyle = '#065F46'; ctx.fillRect(0, 0, cv.width, cv.height);
            ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 3; ctx.strokeRect(15, 15, cv.width - 30, cv.height - 30);
            ctx.beginPath(); ctx.moveTo(15, cv.height / 2); ctx.lineTo(cv.width - 15, cv.height / 2); ctx.stroke();
            tacticalPlayers.forEach(p => {
              ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.strokeStyle = '#FFFFFF'; ctx.stroke();
              ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.label, p.x, p.y);
            });
          };

          // Handler Kehadiran & Sesi
          const handleRsvpChange = (sessionId, playerId, status) => {
            const session = sessions.find(s => s.id === sessionId);
            if (session && session.isClosed) { showToast("Sesi sudah ditutup!", "error"); return; }
            const updated = sessions.map(s => s.id === sessionId ? { ...s, rsvps: { ...s.rsvps, [playerId]: status } } : s);
            setSessions(updated); persistData({ sessions: updated });
          };

          const updateSessionInfo = (sessionId, field, value) => {
              const updated = sessions.map(s => s.id === sessionId ? { ...s, [field]: value } : s);
              setSessions(updated); persistData({ sessions: updated });
          };

          const handleCloseSession = (sessionId) => {
             const session = sessions.find(s => s.id === sessionId);
             if(!session) return;
             
             const attendees = Object.keys(session.rsvps).filter(uid => session.rsvps[uid] === 'YES').map(uid => players.find(p=>p.id===uid)?.name).filter(Boolean);
             const historyLog = { ...session, isClosed: true, attendees };
             const newHistory = [historyLog, ...sessionHistory];
             
             let nextDateStr = "";
             const parts = session.date.split('-');
             if (parts.length === 3) {
                 let d = new Date(parts[0], parts[1] - 1, parts[2]);
                 d.setDate(d.getDate() + 7);
                 const yyyy = d.getFullYear();
                 const mm = String(d.getMonth() + 1).padStart(2, '0');
                 const dd = String(d.getDate()).padStart(2, '0');
                 nextDateStr = `${yyyy}-${mm}-${dd}`;
             } else {
                 nextDateStr = new Date().toISOString().slice(0, 10);
             }

             const newSession = {
                 id: 's_' + Date.now(), date: nextDateStr, day: session.day,
                 location: session.location, court: session.court, time: session.time,
                 isClosed: false, rsvps: {}
             };

             setSessions([newSession]);
             setSessionHistory(newHistory);
             persistData({ sessions: [newSession], sessionHistory: newHistory });
             showToast("Sesi Ditutup! Histori tersimpan & Jadwal baru dibuat 🗓️", "success");
          };

          // Handler Edit Form Anggota
          const handleEditClick = (p) => {
             setEditPlayerId(p.id); setPName(p.name); setPWa(p.whatsapp || ''); setPRole(p.role); setPType(p.type); setPFee(p.fee.toString());
             window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const cancelEdit = () => {
             setEditPlayerId(null); setPName(''); setPWa(''); setPRole('player'); setPType('monthly'); setPFee('100000');
          };

          const handleAddPlayer = (e) => {
            e.preventDefault();
            if (!pName.trim()) { showToast("Nama tidak boleh kosong!", "error"); return; }
            
            if (editPlayerId) {
                const updatedPlayers = players.map(p => 
                    p.id === editPlayerId ? { ...p, name: pName.trim(), whatsapp: pWa.trim() || '-', role: pRole, type: pType, fee: parseFloat(pFee) || 0 } : p
                );
                setPlayers(updatedPlayers); persistData({ players: updatedPlayers }); showToast("Data Anggota Diperbarui! ✏️", "success"); cancelEdit();
            } else {
                const newPlayer = {
                    id: 'p_' + Date.now(), name: pName.trim(), whatsapp: pWa.trim() || '-', role: pRole, type: pType, fee: parseFloat(pFee) || 0,
                    payments: {"2026-06": false, "2026-07": false}, stats: { played: 0, won: 0, lost: 0 }
                };
                const updatedPlayers = [...players, newPlayer]; setPlayers(updatedPlayers); persistData({ players: updatedPlayers }); showToast("Anggota Baru Terdaftar! 👥", "success"); cancelEdit();
            }
          };

          const togglePayment = (playerId, monthKey) => {
             const player = players.find(p => p.id === playerId);
             const isPaid = player.payments?.[monthKey];
             
             const updated = players.map(p => {
                 if (p.id === playerId) return { ...p, payments: { ...p.payments, [monthKey]: !isPaid } };
                 return p;
             });
             setPlayers(updated);
             
             if (!isPaid && player.fee > 0) {
                 const newTx = {
                    id: 't_' + Date.now(), type: 'credit', category: 'iuran', amount: player.fee, 
                    description: `Iuran Bulanan (${monthKey}) - ${player.name}`,
                    date: new Date().toISOString().slice(0, 10), note: "Auto-Sync Roster", hasReceipt: false
                 };
                 const updatedTransactions = [newTx, ...transactions];
                 setTransactions(updatedTransactions); persistData({ players: updated, transactions: updatedTransactions }); showToast(`LUNAS! Rp ${player.fee.toLocaleString('id-ID')} masuk ke Kas ✅`, "success");
             } else {
                 persistData({ players: updated });
                 if(!isPaid && player.fee === 0) { showToast("Status Lunas. (Fee Rp 0, Kas tidak berubah) ✅", "success"); } else { showToast("Status diubah ke Belum Lunas. (Cek Kas Manual) ❌", "info"); }
             }
          };

          const payPerPlay = (playerId) => {
             const player = players.find(p => p.id === playerId);
             if (player.fee <= 0) { showToast("Fee per play pemain ini adalah Rp 0.", "info"); return; }
             const newTx = {
                  id: 't_' + Date.now(), type: 'credit', category: 'iuran', amount: player.fee, 
                  description: `Iuran Harian - ${player.name}`,
                  date: new Date().toISOString().slice(0, 10), note: "Auto-Sync Roster", hasReceipt: false
             };
             const updatedTransactions = [newTx, ...transactions]; setTransactions(updatedTransactions); persistData({ transactions: updatedTransactions }); showToast(`Iuran Harian Rp ${player.fee.toLocaleString('id-ID')} masuk ke Kas ✅`, "success");
          };

          // Handler Transaksi Keuangan
          const handleAddTransaction = (e) => {
            e.preventDefault(); const parsedAmount = parseFloat(txAmount);
            if (isNaN(parsedAmount) || parsedAmount <= 0) { showToast("Jumlah tidak valid!", "error"); return; }
            let type = txType; let finalDesc = txDesc.trim() || (txCategory === 'iuran' ? "Pemasukan: Iuran" : "Transaksi Lainnya");
            if (txCategory === 'sewa' || txCategory === 'shuttlecock') type = 'debit';

            if (editTxId) {
                const updatedTransactions = transactions.map(t => 
                    t.id === editTxId ? { ...t, type, category: txCategory, amount: parsedAmount, description: finalDesc, note: txMethod === 'upload' ? (receiptName || "Bukti Unggah") : "Input Manual" } : t
                );
                setTransactions(updatedTransactions); persistData({ transactions: updatedTransactions }); showToast("Data Kas Diperbarui! ✏️", "success"); setEditTxId(null);
            } else {
                const newTx = {
                    id: 't_' + Date.now(), type, category: txCategory, amount: parsedAmount, description: finalDesc,
                    date: new Date().toISOString().slice(0, 10), note: txMethod === 'upload' ? (receiptName || "Bukti Unggah") : "Input Manual", hasReceipt: txMethod === 'upload'
                };
                const updatedTransactions = [newTx, ...transactions]; setTransactions(updatedTransactions); persistData({ transactions: updatedTransactions }); showToast("Data Kas Disimpan! 💰", "success");
            }
            setTxAmount(''); setTxDesc(''); setReceiptName(''); setTxMethod('manual');
          };

          const handleEditTransaction = (t) => {
              setEditTxId(t.id); setTxCategory(t.category); setTxType(t.type); setTxAmount(t.amount.toString()); setTxDesc(t.description); window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleDeleteTransaction = (id) => {
              if (window.confirm("Apakah Anda yakin ingin menghapus transaksi ini?")) {
                  const updatedTransactions = transactions.filter(t => t.id !== id);
                  setTransactions(updatedTransactions); persistData({ transactions: updatedTransactions }); showToast("Transaksi Dihapus! 🗑️", "info");
              }
          };

          const handleFileChange = (e) => { if (e.target.files && e.target.files[0]) { setReceiptName(e.target.files[0].name); showToast(`File disiapkan! 📄`, "info"); } };

          // Handler Match
          const updateScore = (setIndex, team, delta) => {
              const newSets = [...sets]; newSets[setIndex][team] = Math.max(0, newSets[setIndex][team] + delta); setSets(newSets);
          };

          const handleSaveMatch = () => {
              if (!teamA[0] || !teamB[0]) { showToast("Pilih 1 pemain ditiap tim!", "error"); return; }
              let winsA = 0; let winsB = 0; sets.forEach(s => { if (s.a > s.b) winsA++; else if (s.b > s.a) winsB++; });
              if (winsA === 0 && winsB === 0) { showToast("Skor masih kosong!", "error"); return; }

              const isTeamAWinner = winsA > winsB;
              const updatedPlayers = players.map(p => {
                 let isPlaying = false; let isWinner = false;
                 if (teamA.includes(p.id)) { isPlaying = true; isWinner = isTeamAWinner; }
                 if (teamB.includes(p.id)) { isPlaying = true; isWinner = !isTeamAWinner; }
                 if (isPlaying) { return { ...p, stats: { played: (p.stats?.played || 0) + 1, won: (p.stats?.won || 0) + (isWinner ? 1 : 0), lost: (p.stats?.lost || 0) + (!isWinner ? 1 : 0) } }; }
                 return p;
              });

              const newMatchLog = {
                  id: 'm_' + Date.now(), date: new Date().toLocaleString('id-ID'),
                  teamA: teamA.map(id => players.find(p => p.id === id)?.name).filter(Boolean),
                  teamB: teamB.map(id => players.find(p => p.id === id)?.name).filter(Boolean),
                  sets: [...sets], winner: isTeamAWinner ? 'A' : (winsB > winsA ? 'B' : 'Draw')
              };

              const updatedMatches = [newMatchLog, ...matches]; setPlayers(updatedPlayers); setMatches(updatedMatches); persistData({ players: updatedPlayers, matches: updatedMatches });
              setSets([{a:0, b:0}, {a:0, b:0}, {a:0, b:0}]); setTeamA(['', '']); setTeamB(['', '']); showToast("Match Tersimpan! Statistik diupdate 🏆", "success");
          };

          const totalUangMasuk = transactions.filter(t => t.type === 'credit').reduce((sum, t) => sum + t.amount, 0);
          const totalUangKeluar = transactions.filter(t => t.type === 'debit').reduce((sum, t) => sum + t.amount, 0);
          const saldoKas = totalUangMasuk - totalUangKeluar;

          // Copy URL & WA
          const getShareUrl = () => {
              const baseUrl = `${window.location.origin}${window.location.pathname}`;
              return `${baseUrl}?workspace=${workspaceUrl || 'DEFAULT_ROOM'}`;
          };

          const activeSession = sessions[0] || {};
          const rsvps = activeSession.rsvps || {};
          
          const attending = players.filter(p => rsvps[p.id] === 'YES');
          const absent = players.filter(p => rsvps[p.id] === 'NO');
          const maybe = players.filter(p => rsvps[p.id] === 'MAYBE');
          const notVoted = players.filter(p => !rsvps[p.id] || rsvps[p.id] === 'NO_RESPONSE');

                            </h3>
                            <form onSubmit={handleAddTransaction} className="space-y-3">
                                <select value={txCategory} onChange={(e) => { setTxCategory(e.target.value); if(e.target.value==='iuran') setTxType('credit'); else if(e.target.value==='sewa'||e.target.value==='shuttlecock') setTxType('debit'); }} className="w-full bg-gray-950 border border-gray-800 px-3 py-2 text-xs rounded-xl text-white">
                                    <option value="iuran">💰 Pemasukan (Iuran)</option><option value="sewa">🏢 Pengeluaran (Sewa)</option><option value="shuttlecock">🏸 Pengeluaran (Bola)</option><option value="lainnya">📦 Lainnya</option>
                                </select>
                                <input type="number" value={txAmount} onChange={(e) => setTxAmount(e.target.value)} placeholder="Nominal Rp" className="w-full bg-gray-950 border border-gray-800 p-2.5 text-xs text-white rounded-xl" />
                                <input type="text" value={txDesc} onChange={(e) => setTxDesc(e.target.value)} placeholder="Keterangan Transaksi" className="w-full bg-gray-950 border border-gray-800 p-2.5 text-xs text-white rounded-xl" />
                                <div className="bg-gray-950 p-3 rounded-2xl border border-gray-800">
                                    <label className="text-[10px] font-bold text-gray-400 block mb-2">Metode Bukti:</label>
                                    <div className="flex gap-4 text-xs"><label><input type="radio" checked={txMethod==='manual'} onChange={()=>setTxMethod('manual')} className="mr-1"/>Manual</label><label><input type="radio" checked={txMethod==='upload'} onChange={()=>setTxMethod('upload')} className="mr-1"/>Upload</label></div>
                                    {txMethod === 'upload' && (<input type="file" onChange={handleFileChange} className="mt-2 text-[10px] w-full text-emerald-400" />)}
                                </div>
                                <div className="flex gap-2">
                                    <button type="submit" className={`flex-1 py-2.5 font-black text-xs rounded-xl ${editTxId ? 'bg-yellow-500 text-gray-950' : 'bg-emerald-500 text-gray-950'}`}>{editTxId ? "Update Data 💾" : "Simpan 💾"}</button>
                                    {editTxId && (<button type="button" onClick={() => { setEditTxId(null); setTxAmount(''); setTxDesc(''); setTxCategory('iuran'); setTxType('credit'); }} className="flex-1 bg-gray-700 text-white text-xs font-black rounded-xl">Batal</button>)}
                                </div>
                            </form>
                        </div>
                    </div>

                    {/* LIST TRANSAKSI (Kanan di PC) */}
                    <div className="w-full md:w-2/3 space-y-2 max-h-[500px] md:max-h-[700px] overflow-y-auto pr-1">
                      {transactions.map(t => (
                        <div key={t.id} className="p-3.5 bg-gray-900 border border-gray-800 rounded-2xl flex justify-between items-center shadow-md">
                          <div>
                            <span className="text-xs font-bold text-white block">{t.description} {t.hasReceipt && "📄"}</span>
                            <span className="text-[9px] text-gray-500">{t.date} | {t.note}</span>
                          </div>
                          
                          <div className="flex items-center gap-3">
                              <span className={`text-xs font-black ${t.type === 'credit' ? 'text-emerald-400' : 'text-red-400'}`}>
                                {t.type === 'credit' ? '+' : '-'} Rp {t.amount.toLocaleString('id-ID')}
                              </span>
                              <div className="flex gap-1">
                                  <button onClick={() => handleEditTransaction(t)} className="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-[10px]" title="Edit">✏️</button>
                                  <button onClick={() => handleDeleteTransaction(t.id)} className="bg-red-900 hover:bg-red-800 px-2 py-1 rounded text-[10px]" title="Hapus">❌</button>
                              </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 5. TAB TAKTIKAL */}
                {activeTab === 'tactical' && (
                  <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl flex flex-col items-center justify-center max-w-lg mx-auto">
                    <h3 className="text-sm font-bold text-white mb-2 w-full text-center">📋 Papan Strategi Court</h3>
                    <p className="text-[10px] text-gray-400 mb-4 w-full text-center">Visualisasi taktik lapangan statis.</p>
                    <canvas ref={canvasRef} width="300" height="400" className="border border-gray-800 rounded-2xl bg-emerald-950 shadow-2xl max-w-full" />
                  </div>
                )}

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
