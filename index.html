<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Selasa Ceria</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen selection:bg-emerald-500 selection:text-gray-950">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DEFAULT_APP_ID = 'badminton-selasa-ceria';
        
        const FALLBACK_FIREBASE_CONFIG = {
          apiKey: "AIzaSyAKWV_5Y9gWh7_Mp33YeTYS-v0kGGO0K0s",
          authDomain: "gki-bs-badminton-play.firebaseapp.com",
          projectId: "gki-bs-badminton-play",
          storageBucket: "gki-bs-badminton-play.firebasestorage.app",
          messagingSenderId: "496261059958",
          appId: "1:496261059958:web:8b58e42f05dbc24fd3d657",
          measurementId: "G-VFEJCT46PF"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : FALLBACK_FIREBASE_CONFIG;
        const appId = typeof __app_id !== 'undefined' ? __app_id : DEFAULT_APP_ID;

        if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();

        // --- DATA AWAL ---
        const INITIAL_PLAYERS = [
          { "id": "p1", "name": "Dr. Husni Lubis", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 100000, "payments": {"2026-06": true, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p2", "name": "Lae Agustin Tampubolon", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 100000, "payments": {"2026-06": true, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p3", "name": "Lae Handi", "whatsapp": "-", "role": "admin", "type": "monthly", "fee": 150000, "payments": {"2026-06": true, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p4", "name": "Lae Juntak", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 100000, "payments": {"2026-06": true, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p5", "name": "Lae Pakpahan", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 50000, "payments": {"2026-06": true, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p6", "name": "Uda", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 50000, "payments": {"2026-06": true, "2026-07": false}, "stats": { "played": 0, "won": 0, "lost": 0 } }
        ];

        const INITIAL_TRANSACTIONS = [
          { "id": "t1", "type": "credit", "category": "iuran", "amount": 550000, "description": "Iuran bulan Juni 2026", "date": "2026-06-08", "note": "Manual - Kas Masuk", "hasReceipt": false },
          { "id": "t2", "type": "debit", "category": "sewa", "amount": 400000, "description": "Bayar sewa lapangan bulan Juni 2026", "date": "2026-06-08", "note": "Slip Transfer", "hasReceipt": true },
          { "id": "t3", "type": "debit", "category": "shuttlecock", "amount": 260000, "description": "Beli bola 2 tabung, merk AW", "date": "2026-06-08", "note": "Kuitansi Fisik", "hasReceipt": true }
        ];

        const INITIAL_SESSIONS = [
          { "id": "s1", "date": "2026-06-09", "day": "Selasa", "location": "Sport Hill Arena, Batam", "court": "Court 10", "time": "19:00 - 21:00", "isClosed": false, "rsvps": {} }
        ];

        const loadInitialData = () => {
            try { const local = localStorage.getItem('badminton_selasa_ceriadata_v3'); if (local) return JSON.parse(local); } catch (e) {}
            return { players: INITIAL_PLAYERS, sessions: INITIAL_SESSIONS, transactions: INITIAL_TRANSACTIONS, matches: [], updatedAt: 0 };
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [selectedCourt, setSelectedCourt] = useState('Court 10');
          
          const initialData = loadInitialData();
          const [players, setPlayers] = useState(initialData.players);
          const [sessions, setSessions] = useState(initialData.sessions);
          const [transactions, setTransactions] = useState(initialData.transactions);
          const [matches, setMatches] = useState(initialData.matches || []);

          const stateRef = useRef(initialData);
          const localUpdatedAt = useRef(initialData.updatedAt || 0);

          // State Scoreboard Match
          const [teamA, setTeamA] = useState(['', '']);
          const [teamB, setTeamB] = useState(['', '']);
          const [sets, setSets] = useState([{a:0, b:0}, {a:0, b:0}, {a:0, b:0}]);

          const [notification, setNotification] = useState(null);
          const [workspaceUrl, setWorkspaceUrl] = useState('');
          const [user, setUser] = useState(null);
          const [cloudStatus, setCloudStatus] = useState('pending'); 

          const showToast = (message, type = 'info') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3500);
          };

          const persistData = (updatedFields) => {
            const newTimestamp = Date.now();
            const payload = { players: stateRef.current.players, sessions: stateRef.current.sessions, transactions: stateRef.current.transactions, matches: stateRef.current.matches, ...updatedFields, updatedAt: newTimestamp };
            stateRef.current = payload; localUpdatedAt.current = newTimestamp;
            localStorage.setItem('badminton_selasa_ceriadata_v3', JSON.stringify(payload));

            if (cloudStatus === 'connected' && workspaceUrl && user) {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(workspaceUrl).set(payload).catch(err => console.error(err));
            }
          };

          useEffect(() => {
            auth.signInAnonymously().catch(() => setCloudStatus('error_firestore'));
            const unsubAuth = auth.onAuthStateChanged(currentUser => { if (currentUser) setUser(currentUser); });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!user) return;
            const params = new URLSearchParams(window.location.search);
            const activeRoomId = params.get('workspace') || 'DEFAULT_ROOM';
            setWorkspaceUrl(activeRoomId);
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(activeRoomId);
            
            const unsubFirestore = roomRef.onSnapshot(doc => {
              if (doc.exists) {
                const cloudData = doc.data();
                if (cloudData.updatedAt > localUpdatedAt.current) {
                  localUpdatedAt.current = cloudData.updatedAt; stateRef.current = cloudData;
                  setPlayers(cloudData.players || INITIAL_PLAYERS); setSessions(cloudData.sessions || INITIAL_SESSIONS); 
                  setTransactions(cloudData.transactions || INITIAL_TRANSACTIONS); setMatches(cloudData.matches || []);
                  localStorage.setItem('badminton_selasa_ceriadata_v3', JSON.stringify(cloudData));
                }
              } else { persistData({}); }
              setCloudStatus('connected');
            }, () => setCloudStatus('error_firestore'));
            return () => unsubFirestore();
          }, [user]);

          // Handler Absensi RSVP
          const handleRsvpChange = (sessionId, playerId, status) => {
            const session = sessions.find(s => s.id === sessionId);
            if (session && session.isClosed) { showToast("Sesi sudah ditutup, absensi final telah direkam!", "error"); return; }
            const updated = sessions.map(s => s.id === sessionId ? { ...s, rsvps: { ...s.rsvps, [playerId]: status } } : s);
            setSessions(updated); persistData({ sessions: updated });
          };

          // Handler Kunci Sesi Absensi
          const handleCloseSession = (sessionId) => {
             const updated = sessions.map(s => s.id === sessionId ? { ...s, isClosed: true } : s);
             setSessions(updated); persistData({ sessions: updated });
             showToast("Sesi Ditutup! Absensi final pemain telah direkam 🔒", "success");
          };

          // Update Poin Skor Live Match
          const updateScore = (setIndex, team, delta) => {
              const newSets = [...sets];
              newSets[setIndex][team] = Math.max(0, newSets[setIndex][team] + delta);
              setSets(newSets);
          };

          // Menyimpan Hasil Match dan Update Stats Player Otomatis
          const handleSaveMatch = () => {
              if (!teamA[0] || !teamB[0]) { showToast("Pilih minimal 1 pemain untuk masing-masing tim!", "error"); return; }
              
              let winsA = 0; let winsB = 0;
              sets.forEach(s => {
                  if (s.a > s.b) winsA++;
                  else if (s.b > s.a) winsB++;
              });

              if (winsA === 0 && winsB === 0) { showToast("Skor masih kosong, tidak bisa disimpan!", "error"); return; }

              const isTeamAWinner = winsA > winsB;
              
              // Update Statistik Menang Kalah di Roster Pemain
              const updatedPlayers = players.map(p => {
                 let isPlaying = false;
                 let isWinner = false;
                 if (teamA.includes(p.id)) { isPlaying = true; isWinner = isTeamAWinner; }
                 if (teamB.includes(p.id)) { isPlaying = true; isWinner = !isTeamAWinner; }

                 if (isPlaying) {
                     return {
                         ...p, 
                         stats: { 
                             played: (p.stats?.played || 0) + 1, 
                             won: (p.stats?.won || 0) + (isWinner ? 1 : 0), 
                             lost: (p.stats?.lost || 0) + (!isWinner ? 1 : 0) 
                         }
                     };
                 }
                 return p;
              });

              // Log Data Histori Pertandingan
              const newMatchLog = {
                  id: 'm_' + Date.now(),
                  date: new Date().toLocaleString('id-ID'),
                  teamA: teamA.map(id => players.find(p => p.id === id)?.name).filter(Boolean),
                  teamB: teamB.map(id => players.find(p => p.id === id)?.name).filter(Boolean),
                  sets: [...sets],
                  winner: isTeamAWinner ? 'A' : (winsB > winsA ? 'B' : 'Draw')
              };

              const updatedMatches = [newMatchLog, ...matches];
              
              // Update State dan Sinkronisasi
              setPlayers(updatedPlayers);
              setMatches(updatedMatches);
              persistData({ players: updatedPlayers, matches: updatedMatches });

              // Reset Form
              setSets([{a:0, b:0}, {a:0, b:0}, {a:0, b:0}]);
              setTeamA(['', '']); setTeamB(['', '']);
              showToast("Hasil Match Tersimpan! Statistik pemain otomatis diupdate 🏆", "success");
          };

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans antialiased pb-20">
              {notification && (
                <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-xl bg-emerald-950/90 border border-emerald-500 text-emerald-200 shadow-2xl flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" /> <p className="text-sm font-semibold">{notification.message}</p>
                </div>
              )}

              <header className="border-b border-gray-800 bg-gray-900/60 backdrop-blur-xl sticky top-0 z-40 px-4">
                <div className="max-w-md mx-auto h-16 flex items-center justify-between">
                  <div><h1 className="text-base font-black text-emerald-400">Badminton Selasa Ceria</h1></div>
                </div>
              </header>

              <nav className="max-w-md mx-auto px-4 my-4">
                <div className="bg-gray-900 p-1 rounded-2xl flex flex-wrap gap-1">
                  <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-2 rounded-xl text-[10px] font-bold transition ${activeTab === 'dashboard' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400'}`}>🗓️ RSVP & Absen</button>
                  <button onClick={() => setActiveTab('matchmaker')} className={`flex-1 py-2 rounded-xl text-[10px] font-bold transition ${activeTab === 'matchmaker' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400'}`}>🔥 Skor Match</button>
                  <button onClick={() => setActiveTab('players')} className={`flex-1 py-2 rounded-xl text-[10px] font-bold transition ${activeTab === 'players' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400'}`}>👥 Stats Pemain</button>
                </div>
              </nav>

              <main className="max-w-md mx-auto px-4">
                
                {/* TAB RSVP & ABSENSI FINAL */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-4">
                    {sessions.map(s => {
                      const hadirCount = Object.values(s.rsvps || {}).filter(status => status === 'YES').length;
                      return (
                      <div key={s.id} className="bg-gray-900 border border-gray-800 rounded-3xl p-5 shadow-xl space-y-4 relative overflow-hidden">
                        {s.isClosed && <div className="absolute top-4 right-4 bg-red-600 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase tracking-widest shadow-lg transform rotate-12 border border-red-400">Absensi Final<br/>Terkunci</div>}
                        
                        <div className="border-b border-gray-800 pb-3">
                          <h3 className="text-sm font-black text-white">Sesi Latihan Terjadwal</h3>
                          <p className="text-xs text-gray-400">{s.day}, {s.date} | {s.time} WIB</p>
                        </div>
                        
                        <div className="bg-gray-950 p-3 rounded-2xl border border-gray-800 flex justify-between items-center">
                            <span className="text-xs text-gray-400 font-bold uppercase">Total Pemain Hadir:</span>
                            <span className="text-xl font-black text-emerald-400">{hadirCount} Orang</span>
                        </div>

                        <div className="space-y-2 pt-2">
                          <h4 className="text-[10px] font-bold uppercase text-gray-500 mb-2">Konfirmasi Kehadiran:</h4>
                          {players.map(p => {
                            const status = s.rsvps?.[p.id] || 'NO_RESPONSE';
                            return (
                              <div key={p.id} className={`flex justify-between items-center p-2 rounded-xl border ${s.isClosed ? 'bg-gray-950/20 border-gray-900 opacity-60' : 'bg-gray-950/40 border-gray-800'}`}>
                                <span className="text-xs font-bold text-white w-24 truncate">{p.name}</span>
                                <div className="flex gap-1">
                                  <button onClick={() => handleRsvpChange(s.id, p.id, 'YES')} disabled={s.isClosed} className={`px-2 py-1 text-[10px] font-bold rounded-lg ${status === 'YES' ? 'bg-emerald-500 text-gray-950' : 'bg-gray-800 text-gray-400'}`}>Ikut</button>
                                  <button onClick={() => handleRsvpChange(s.id, p.id, 'NO')} disabled={s.isClosed} className={`px-2 py-1 text-[10px] font-bold rounded-lg ${status === 'NO' ? 'bg-red-500 text-white' : 'bg-gray-800 text-gray-400'}`}>Absen</button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        
                        {!s.isClosed && (
                            <button onClick={() => handleCloseSession(s.id)} className="w-full mt-4 py-3 bg-red-950/50 hover:bg-red-900 border border-red-800 text-red-400 text-xs font-black rounded-xl transition-all">
                                🔒 Tutup Sesi & Rekap Absensi Final
                            </button>
                        )}
                      </div>
                      )
                    })}
                  </div>
                )}

                {/* TAB PAPAN SKOR & MATCH HISTORI */}
                {activeTab === 'matchmaker' && (
                  <div className="space-y-4">
                    <div className="bg-gray-900 border border-gray-800 p-5 rounded-3xl shadow-xl">
                        <h3 className="text-sm font-black text-emerald-400 mb-4 text-center uppercase tracking-widest border-b border-gray-800 pb-3">🔥 Papan Skor Live (Best of 3)</h3>
                        
                        {/* Pilihan Tim */}
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="space-y-2">
                                <div className="bg-indigo-950 p-2 rounded-lg text-center border border-indigo-900"><span className="text-[10px] font-black text-indigo-400 uppercase">TIM A</span></div>
                                <select value={teamA[0]} onChange={(e)=>setTeamA([e.target.value, teamA[1]])} className="w-full bg-gray-950 border border-gray-800 p-2 rounded-lg text-xs text-white"><option value="">Pilih Pemain 1...</option>{players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
                                <select value={teamA[1]} onChange={(e)=>setTeamA([teamA[0], e.target.value])} className="w-full bg-gray-950 border border-gray-800 p-2 rounded-lg text-xs text-white"><option value="">Pilih Pemain 2...</option>{players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
                            </div>
                            <div className="space-y-2">
                                <div className="bg-red-950 p-2 rounded-lg text-center border border-red-900"><span className="text-[10px] font-black text-red-400 uppercase">TIM B</span></div>
                                <select value={teamB[0]} onChange={(e)=>setTeamB([e.target.value, teamB[1]])} className="w-full bg-gray-950 border border-gray-800 p-2 rounded-lg text-xs text-white"><option value="">Pilih Pemain 1...</option>{players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
                                <select value={teamB[1]} onChange={(e)=>setTeamB([teamB[0], e.target.value])} className="w-full bg-gray-950 border border-gray-800 p-2 rounded-lg text-xs text-white"><option value="">Pilih Pemain 2...</option>{players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
                            </div>
                        </div>

                        {/* Input Skor Per Set */}
                        <div className="space-y-3">
                            {[0, 1, 2].map((idx) => (
                                <div key={idx} className="bg-gray-950 p-3 rounded-xl border border-gray-800 flex items-center justify-between">
                                    <div className="flex flex-col items-center gap-1 w-1/3">
                                        <div className="flex gap-1 w-full"><button onClick={()=>updateScore(idx,'a',-1)} className="flex-1 bg-gray-800 rounded text-gray-400 text-xs">-</button><button onClick={()=>updateScore(idx,'a',1)} className="flex-1 bg-indigo-900 rounded text-indigo-300 text-xs py-1">+</button></div>
                                        <span className="text-2xl font-black text-indigo-400">{sets[idx].a}</span>
                                    </div>
                                    <div className="text-[10px] text-gray-500 font-black uppercase text-center w-1/3">Set {idx+1}</div>
                                    <div className="flex flex-col items-center gap-1 w-1/3">
                                        <div className="flex gap-1 w-full"><button onClick={()=>updateScore(idx,'b',-1)} className="flex-1 bg-gray-800 rounded text-gray-400 text-xs">-</button><button onClick={()=>updateScore(idx,'b',1)} className="flex-1 bg-red-900 rounded text-red-300 text-xs py-1">+</button></div>
                                        <span className="text-2xl font-black text-red-400">{sets[idx].b}</span>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <button onClick={handleSaveMatch} className="w-full mt-5 py-3 bg-emerald-500 text-gray-950 font-black text-xs rounded-xl hover:bg-emerald-400 shadow-lg transition-all">
                            💾 Simpan Hasil Match & Update Statistik
                        </button>
                    </div>

                    {/* Histori Pertandingan */}
                    <div className="bg-gray-900 border border-gray-800 p-4 rounded-3xl shadow-xl">
                        <h3 className="text-xs font-black text-white mb-3 uppercase tracking-wider">📋 Histori Pertandingan Hari Ini</h3>
                        <div className="space-y-3 max-h-[300px] overflow-y-auto">
                            {matches.length === 0 ? <p className="text-xs text-gray-500 text-center italic">Belum ada histori permainan.</p> : null}
                            {matches.map((m, i) => (
                                <div key={m.id} className="bg-gray-950 p-3 rounded-2xl border border-gray-800">
                                    <div className="flex justify-between text-[9px] text-gray-500 border-b border-gray-800 pb-1 mb-2"><span>Match #{matches.length - i}</span><span>{m.date}</span></div>
                                    <div className="flex justify-between items-center">
                                        <div className={`w-2/5 text-xs font-bold ${m.winner === 'A' ? 'text-indigo-400' : 'text-gray-400'}`}>{m.teamA.join(' & ')}</div>
                                        <div className="w-1/5 text-center flex flex-col items-center gap-0.5">
                                            {m.sets.map((s, idx) => {
                                                if(s.a===0 && s.b===0) return null;
                                                return <span key={idx} className="text-[10px] bg-gray-800 px-1.5 rounded font-mono text-gray-300">{s.a} - {s.b}</span>
                                            })}
                                        </div>
                                        <div className={`w-2/5 text-right text-xs font-bold ${m.winner === 'B' ? 'text-red-400' : 'text-gray-400'}`}>{m.teamB.join(' & ')}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                  </div>
                )}

                {/* TAB STATS PEMAIN */}
                {activeTab === 'players' && (
                  <div className="space-y-4">
                    <div className="bg-gray-900 border border-gray-800 rounded-3xl p-5 shadow-xl">
                      <h3 className="text-xs font-black text-white mb-4 uppercase tracking-wider">📊 Papan Peringkat & Statistik (M/K)</h3>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-xs">
                          <thead>
                            <tr className="bg-gray-950 text-gray-400 border-b border-gray-800">
                              <th className="p-3 rounded-tl-xl">Pemain</th>
                              <th className="p-3 text-center">Match</th>
                              <th className="p-3 text-center text-emerald-400">Menang (M)</th>
                              <th className="p-3 text-center text-red-400 rounded-tr-xl">Kalah (K)</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-800/60">
                            {players.sort((a,b) => (b.stats?.won || 0) - (a.stats?.won || 0)).map(p => (
                              <tr key={p.id} className="hover:bg-gray-900/40">
                                <td className="p-3 font-bold text-white">{p.name}</td>
                                <td className="p-3 text-center font-mono">{p.stats?.played || 0}</td>
                                <td className="p-3 text-center font-mono text-emerald-400 font-bold">{p.stats?.won || 0}</td>
                                <td className="p-3 text-center font-mono text-red-400">{p.stats?.lost || 0}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <p className="text-[9px] text-gray-500 mt-4 text-center italic">Catatan: Statistik diperbarui secara otomatis setiap kali Hasil Match disimpan.</p>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
