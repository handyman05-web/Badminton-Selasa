<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Badminton Selasa Ceria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-white font-sans p-4">
    <div id="root" class="max-w-md mx-auto"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [players, setPlayers] = useState([
                { id: 1, name: "Dr. Husni", type: "Bulanan", stats: "0/0" },
                { id: 2, name: "Handi", type: "Bulanan", stats: "0/0" }
            ]);
            const [score, setScore] = useState({a: 0, b: 0});
            const waLink = `https://wa.me/?text=Yuk%20cek%20Jadwal%20dan%20Skor%20malam%20ini:%20${encodeURIComponent(window.location.href)}`;

            return (
                <div className="space-y-6">
                    <header className="flex justify-between items-center">
                        <h1 className="text-lg font-black text-emerald-400">Badminton Selasa Ceria</h1>
                        <a href={waLink} target="_blank" className="bg-green-600 text-[9px] font-bold px-3 py-1 rounded-lg">SHARE WA 📲</a>
                    </header>

                    {/* RSVP & Tambah Pemain */}
                    <div className="bg-gray-900 p-4 rounded-2xl">
                        <h2 className="text-xs font-bold mb-3 uppercase">Tambah Pemain / RSVP</h2>
                        <form className="space-y-2" onSubmit={(e) => { e.preventDefault(); setPlayers([...players, {id: Date.now(), name: e.target.name.value, type: e.target.type.value, stats: "0/0"}]); e.target.reset(); }}>
                            <input name="name" placeholder="Nama" className="w-full bg-gray-950 p-2 text-xs rounded" required />
                            <select name="type" className="w-full bg-gray-950 p-2 text-xs rounded"><option value="Bulanan">Bulanan</option><option value="Per Play">Per Play</option></select>
                            <button className="w-full bg-emerald-500 py-2 text-black font-bold text-xs rounded">SIMPAN</button>
                        </form>
                    </div>

                    {/* Skor */}
                    <div className="grid grid-cols-2 gap-4 text-center">
                        <div className="bg-gray-900 p-4 rounded-2xl">
                            <div className="text-3xl font-black">{score.a}</div>
                            <button onClick={() => setScore({...score, a: score.a + 1})} className="text-[10px] mt-2 bg-indigo-600 px-4 py-1 rounded">TIM A +</button>
                        </div>
                        <div className="bg-gray-900 p-4 rounded-2xl">
                            <div className="text-3xl font-black">{score.b}</div>
                            <button onClick={() => setScore({...score, b: score.b + 1})} className="text-[10px] mt-2 bg-red-600 px-4 py-1 rounded">TIM B +</button>
                        </div>
                    </div>

                    {/* Daftar Pemain */}
                    <div className="space-y-2">
                        {players.map(p => (
                            <div key={p.id} className="flex justify-between bg-gray-900 p-3 rounded text-xs">
                                <span>{p.name} <span className="text-[9px] text-gray-500">({p.type})</span></span>
                                <span className="font-mono text-emerald-400">Stat: {p.stats}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
