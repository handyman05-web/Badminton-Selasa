<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Selasa Ceria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen selection:bg-emerald-500 selection:text-gray-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCourt, setSelectedCourt] = useState('Court 10');
            
            // Data Pemain
            const players = [
                { name: "Dr. Husni Lubis", type: "Flat", stats: "0/0/0" },
                { name: "Lae Agustin Tampubolon", type: "Flat", stats: "0/0/0" },
                { name: "Lae Handi", type: "Flat", stats: "0/0/0" },
                { name: "Lae Juntak", type: "Flat", stats: "0/0/0" },
                { name: "Lae Pakpahan", type: "Flat", stats: "0/0/0" },
                { name: "Uda", type: "Flat", stats: "0/0/0" }
            ];

            return (
                <div className="max-w-md mx-auto p-4 space-y-6">
                    {/* Header Terpadu */}
                    <header className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-10 text-6xl">🏸</div>
                        <h1 className="text-2xl font-black text-emerald-400 relative z-10">Badminton Selasa Ceria</h1>
                        <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1 relative z-10">Sport Hill Arena, Batam</p>
                        
                        <div className="mt-6 relative z-10">
                            <label className="text-[10px] font-bold text-gray-500 uppercase">Pilih Nomor Lapangan (Sesi Malam Ini):</label>
                            <select 
                                value={selectedCourt} 
                                onChange={(e) => setSelectedCourt(e.target.value)}
                                className="w-full mt-2 bg-gray-950 border border-emerald-900/50 p-3 rounded-xl text-sm text-white focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer"
                            >
                                {[...Array(10)].map((_, i) => <option key={i} value={Court ${i+1}}>Court {i+1}</option>)}
                            </select>
                        </div>
                    </header>

                    {/* Navigasi Utama */}
                    <nav className="grid grid-cols-3 gap-2 bg-gray-900 p-2 rounded-2xl">
                        {['dashboard', 'players', 'ledger'].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`py-3 text-[10px] font-black rounded-xl transition-all duration-300 ${
                                    activeTab === tab ? 'bg-emerald-500 text-gray-950 shadow-lg shadow-emerald-500/20 scale-105' : 'text-gray-400 hover:bg-gray-800'
                                }`}
                            >
                                {tab === 'dashboard' ? '📅 DASHBOARD' : tab === 'players' ? '👥 PEMAIN' : '💰 KAS'}
                            </button>
                        ))}
                    </nav>

                    {/* Area Konten Utama */}
                    <main className="bg-gray-900 p-6 rounded-3xl border border-gray-800 min-h-[320px]">
                        
                        {/* Tab Dashboard */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <h2 className="text-lg font-bold border-b border-gray-800 pb-2">Status Bermain</h2>
                                <div className="p-6 bg-gray-950 rounded-2xl border border-emerald-900/30 text-center shadow-inner">
                                    <p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Lapangan Aktif Saat Ini</p>
                                    <p className="text-4xl font-black text-emerald-400 mt-2">{selectedCourt}</p>
                                    <div className="mt-4 inline-block px-3 py-1 bg-emerald-950 text-emerald-400 text-xs font-bold rounded-lg border border-emerald-800/50">
                                        Pukul 19:00 - 21:00 WIB
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab Players */}
                        {activeTab === 'players' && (
                            <div className="animate-in fade-in duration-300">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-bold">Daftar Anggota</h2>
                                    <span className="text-xs bg-gray-800 px-2 py-1 rounded-lg text-emerald-400 font-bold">{players.length} Aktif</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-xs text-gray-300">
                                        <thead>
                                            <tr className="border-b border-gray-800 text-gray-500">
                                                <th className="pb-2 font-bold">Nama Pemain</th>
                                                <th className="pb-2 font-bold text-center">Tipe</th>
                                                <th className="pb-2 font-bold text-right">M/M/K</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {players.map((p, i) => (
                                                <tr key={i} className="border-b border-gray-800/50 hover:bg-gray-800/30 transition-colors">
                                                    <td className="py-3 font-semibold text-white">{p.name}</td>
                                                    <td className="py-3 text-center"><span className="bg-gray-800 px-2 py-0.5 rounded text-[10px]">{p.type}</span></td>
                                                    <td className="py-3 text-right font-mono text-emerald-400">{p.stats}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Tab Ledger (Buku Kas) */}
                        {activeTab === 'ledger' && (
                            <div className="animate-in fade-in duration-300">
                                <h2 className="text-lg font-bold border-b border-gray-800 pb-2 mb-4">Laporan Keuangan Juni 2026</h2>
                                <div className="space-y-3 text-sm">
                                    <div className="flex justify-between p-3 bg-gray-950 rounded-xl border border-gray-800">
                                        <span className="text-gray-400">Total Iuran Masuk</span>
                                        <span className="font-bold text-emerald-400">Rp 550.000</span>
                                    </div>
                                    <div className="flex justify-between p-3 bg-gray-950 rounded-xl border border-gray-800">
                                        <span className="text-gray-400">Biaya Sewa & Bola AW</span>
                                        <span className="font-bold text-red-400">Rp 660.000</span>
                                    </div>
                                    <div className="flex justify-between p-4 bg-gray-800/50 rounded-xl border border-gray-700 mt-2">
                                        <span className="font-black text-white">Saldo Akhir Kas</span>
                                        <span className="font-black text-red-500">- Rp 110.000 (Defisit)</span>
                                    </div>
                                </div>
                                <p className="text-[10px] text-center text-gray-500 mt-4 italic">
                                    Catatan: Data ini mensimulasikan hitungan otomatis dari buku kas.
                                </p>
                            </div>
                        )}
                        
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
