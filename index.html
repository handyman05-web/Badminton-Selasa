<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Selasa Ceria</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen selection:bg-emerald-500 selection:text-gray-950">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI DATABASE ---
        const DEFAULT_APP_ID = 'badminton-selasa-ceria';
        
        // MASUKKAN KONFIGURASI FIREBASE ANDA DI SINI AGAR SINKRONISASI BERJALAN
        const FALLBACK_FIREBASE_CONFIG = {
          apiKey: "AIzaSyAKWV_5Y9gWh7_Mp33YeTYS-v0kGGO0K0s",
          authDomain: "gki-bs-badminton-play.firebaseapp.com",
          projectId: "gki-bs-badminton-play",
          storageBucket: "gki-bs-badminton-play.firebasestorage.app",
          messagingSenderId: "496261059958",
          appId: "1:496261059958:web:8b58e42f05dbc24fd3d657",
          measurementId: "G-VFEJCT46PF"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : FALLBACK_FIREBASE_CONFIG;
        const appId = typeof __app_id !== 'undefined' ? __app_id : DEFAULT_APP_ID;

        if (!window.firebase.apps.length) {
          window.firebase.initializeApp(firebaseConfig);
        }
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();

        // --- DATA AWAL: BADMINTON SELASA CERIA ---
        const INITIAL_PLAYERS = [
          { "id": "p1", "name": "Dr. Husni Lubis", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 100000, "checks": 1, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p2", "name": "Lae Agustin Tampubolon", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 100000, "checks": 1, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p3", "name": "Lae Handi", "whatsapp": "-", "role": "admin", "type": "monthly", "fee": 150000, "checks": 1, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p4", "name": "Lae Juntak", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 100000, "checks": 1, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p5", "name": "Lae Pakpahan", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 50000, "checks": 1, "stats": { "played": 0, "won": 0, "lost": 0 } },
          { "id": "p6", "name": "Uda", "whatsapp": "-", "role": "player", "type": "monthly", "fee": 50000, "checks": 1, "stats": { "played": 0, "won": 0, "lost": 0 } }
        ];

        const INITIAL_TRANSACTIONS = [
          { "id": "t1", "type": "credit", "amount": 550000, "description": "Iuran bulan Juni 2026 (Husni, Agustin, Handi, Juntak, Pakpahan, Uda)", "date": "2026-06-08", "note": "Saldo Kas Masuk" },
          { "id": "t2", "type": "debit", "amount": 400000, "description": "Bayar sewa lapangan bulan Juni 2026", "date": "2026-06-08", "note": "Transfer" },
          { "id": "t3", "type": "debit", "amount": 260000, "description": "Beli bola 2 tabung, merk AW", "date": "2026-06-08", "note": "CASH" }
        ];

        const INITIAL_SESSIONS = [
          {
            "id": "s1",
            "date": "2026-06-09",
            "day": "Selasa",
            "location": "Sport Hill Arena, Batam",
            "court": "Court 10",
            "time": "19:00 - 21:00",
            "courtCost": 400000,
            "shuttlecockCost": 260000,
            "rsvps": {}
          }
        ];

        const INITIAL_TACTICAL = [
            { id: 'tp1', label: 'T1-A', x: 75, y: 150, color: '#3B82F6' },
            { id: 'tp2', label: 'T1-B', x: 75, y: 250, color: '#3B82F6' },
            { id: 'tp3', label: 'T2-A', x: 225, y: 150, color: '#EF4444' },
            { id: 'tp4', label: 'T2-B', x: 225, y: 250, color: '#EF4444' },
        ];

        const loadInitialData = () => {
            try {
                const local = localStorage.getItem('badminton_selasa_data');
                if (local) return JSON.parse(local);
            } catch (e) {}
            return {
                players: INITIAL_PLAYERS,
                sessions: INITIAL_SESSIONS,
                transactions: INITIAL_TRANSACTIONS,
                matches: [],
                tacticalPlayers: INITIAL_TACTICAL,
                updatedAt: 0
            };
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [selectedCourt, setSelectedCourt] = useState('Court 10');
          
          const initialData = loadInitialData();
          const [players, setPlayers] = useState(initialData.players);
          const [sessions, setSessions] = useState(initialData.sessions);
          const [transactions, setTransactions] = useState(initialData.transactions);
          const [matches, setMatches] = useState(initialData.matches);
          const [tacticalPlayers, setTacticalPlayers] = useState(initialData.tacticalPlayers);

          const stateRef = useRef(initialData);
          const localUpdatedAt = useRef(initialData.updatedAt || 0);

          // Form States
          const [newPlayerName, setNewPlayerName] = useState('');
          const [newPlayerWa, setNewPlayerWa] = useState('');
          const [newPlayerRole, setNewPlayerRole] = useState('player');
          const [newPlayerType, setNewPlayerType] = useState('monthly');
          const [newPlayerChecks, setNewPlayerChecks] = useState(0);
          const [guestName, setGuestName] = useState('');
          const [guestType, setGuestType] = useState('per_play');
          const [txType, setTxType] = useState('credit');
          const [txAmount, setTxAmount] = useState('');
          const [txDesc, setTxDesc] = useState('');
          
          const [dPlayer1, setDPlayer1] = useState('');
          const [dPlayer2, setDPlayer2] = useState('');
          const [dPlayer3, setDPlayer3] = useState('');
          const [dPlayer4, setDPlayer4] = useState('');
          const [scoreA, setScoreA] = useState(0);
          const [scoreB, setScoreB] = useState(0);

          const [notification, setNotification] = useState(null);
          const [workspaceUrl, setWorkspaceUrl] = useState('');

          const canvasRef = useRef(null);
          const [draggingId, setDraggingId] = useState(null);
          
          const [user, setUser] = useState(null);
          const [cloudStatus, setCloudStatus] = useState('pending'); 

          const showToast = (message, type = 'info') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3500);
          };

          const persistData = (updatedFields) => {
            const newTimestamp = Date.now();
            const payload = {
                players: stateRef.current.players,
                sessions: stateRef.current.sessions,
                transactions: stateRef.current.transactions,
                matches: stateRef.current.matches,
                tacticalPlayers: stateRef.current.tacticalPlayers,
                ...updatedFields,
                updatedAt: newTimestamp
            };

            stateRef.current = payload;
            localUpdatedAt.current = newTimestamp;
            localStorage.setItem('badminton_selasa_data', JSON.stringify(payload));

            if (cloudStatus === 'connected' && workspaceUrl && user) {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(workspaceUrl)
                  .set(payload)
                  .catch(err => console.error(err));
            }
          };

          useEffect(() => {
            auth.signInAnonymously().catch(err => setCloudStatus('error_firestore'));
            const unsubAuth = auth.onAuthStateChanged(currentUser => {
              if (currentUser) setUser(currentUser);
            });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!user) return;
            const params = new URLSearchParams(window.location.search);
            const activeRoomId = params.get('workspace') || 'DEFAULT_ROOM';
            setWorkspaceUrl(activeRoomId);

            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(activeRoomId);
            
            const unsubFirestore = roomRef.onSnapshot(doc => {
              if (doc.exists) {
                const cloudData = doc.data();
                if (cloudData.updatedAt > localUpdatedAt.current) {
                  localUpdatedAt.current = cloudData.updatedAt;
                  stateRef.current = cloudData;
                  setPlayers(cloudData.players || INITIAL_PLAYERS);
                  setSessions(cloudData.sessions || INITIAL_SESSIONS);
                  setTransactions(cloudData.transactions || INITIAL_TRANSACTIONS);
                  setMatches(cloudData.matches || []);
                  setTacticalPlayers(cloudData.tacticalPlayers || INITIAL_TACTICAL);
                  localStorage.setItem('badminton_selasa_data', JSON.stringify(cloudData));
                }
              } else {
                persistData({}); 
              }
              setCloudStatus('connected');
            }, err => setCloudStatus('error_firestore'));

            return () => unsubFirestore();
          }, [user]);

          const copyWorkspaceLink = () => {
            let activeRoomId = workspaceUrl;
            if (!activeRoomId || activeRoomId === 'DEFAULT_ROOM') {
              activeRoomId = 'ROOM_' + Math.random().toString(36).substring(2, 8).toUpperCase();
              setWorkspaceUrl(activeRoomId);
              const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?workspace=${activeRoomId}`;
              window.history.replaceState({ path: newUrl }, '', newUrl);
            }
            const shareUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?workspace=${activeRoomId}`;
            copyTextToClipboard(shareUrl);
            showToast(`Tautan Room berhasil disalin! 📲`, "success");
            persistData({});
          };

          const totalUangMasuk = transactions.filter(t => t.type === 'credit').reduce((sum, t) => sum + t.amount, 0);
          const totalUangKeluar = transactions.filter(t => t.type === 'debit').reduce((sum, t) => sum + t.amount, 0);
          const saldoKas = totalUangMasuk - totalUangKeluar;

          const handleRsvpChange = (sessionId, playerId, status) => {
            const updated = sessions.map(s => s.id === sessionId ? { ...s, rsvps: { ...s.rsvps, [playerId]: status } } : s);
            setSessions(updated);
            persistData({ sessions: updated });
          };

          const addTransaction = (e) => {
            e.preventDefault();
            const parsedAmount = parseFloat(txAmount);
            if (isNaN(parsedAmount) || parsedAmount <= 0 || !txDesc.trim()) return;
            
            const newTx = {
              id: 't_' + Date.now(), type: txType, amount: parsedAmount, description: txDesc,
              date: new Date().toISOString().slice(0,10)
            };
            const updatedTransactions = [newTx, ...transactions];
            setTransactions(updatedTransactions);
            setTxAmount(''); setTxDesc('');
            showToast("Transaksi Tercatat! 💰", "success");
            persistData({ transactions: updatedTransactions });
          };

          const copyTextToClipboard = (text) => {
            const el = document.createElement("textarea"); el.value = text; el.style.position = "fixed"; document.body.appendChild(el);
            el.focus(); el.select(); document.execCommand('copy'); document.body.removeChild(el);
          };

          // Canvas logic for Tactical Board
          useEffect(() => { if (activeTab === 'tactical') redrawCanvas(); }, [activeTab, tacticalPlayers]);
          const redrawCanvas = () => {
            const cv = canvasRef.current; if (!cv) return;
            const ctx = cv.getContext('2d'); ctx.fillStyle = '#065F46'; ctx.fillRect(0, 0, cv.width, cv.height);
            ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 3; ctx.strokeRect(15, 15, cv.width - 30, cv.height - 30);
            ctx.beginPath(); ctx.moveTo(15, cv.height / 2); ctx.lineTo(cv.width - 15, cv.height / 2); ctx.stroke();
            tacticalPlayers.forEach(p => {
              ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.strokeStyle = '#FFFFFF'; ctx.stroke();
              ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.label, p.x, p.y);
            });
          };

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans antialiased pb-20">
              {notification && (
                <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-xl bg-emerald-950/90 border border-emerald-500 text-emerald-200 shadow-2xl flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
                  <p className="text-sm font-semibold">{notification.message}</p>
                </div>
              )}

              <header className="border-b border-gray-800 bg-gray-900/60 backdrop-blur-xl sticky top-0 z-40 px-4">
                <div className="max-w-7xl mx-auto h-16 flex items-center justify-between">
                  <div>
                    <h1 className="text-lg font-bold text-emerald-400">Badminton Selasa Ceria</h1>
                    <p className="text-xs text-gray-400">Cloud Sync & Ledger</p>
                  </div>
                  <button onClick={copyWorkspaceLink} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-xl transition-all">
                    Share Link 🔗
                  </button>
                </div>
              </header>

              {/* LOCATION & COURT SELECTOR */}
              <section className="max-w-7xl mx-auto px-4 mt-6">
                 <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl">
                    <h3 className="text-sm font-bold text-emerald-400 uppercase tracking-wider mb-2">📍 Lokasi Kegiatan Skuad</h3>
                    <p className="text-xl font-black text-white">Sport Hill Arena, Batam</p>
                    <div className="mt-4">
                        <label className="text-[10px] font-bold text-gray-400 uppercase block mb-2">Pilih Lapangan (Sesi Ini):</label>
                        <select 
                            value={selectedCourt} 
                            onChange={(e) => setSelectedCourt(e.target.value)} 
                            className="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none"
                        >
                            {[...Array(10)].map((_, i) => (
                                <option key={i} value={`Court ${i + 1}`}>Court {i + 1}</option>
                            ))}
                        </select>
                    </div>
                 </div>
              </section>

              {/* STATS WIDGET */}
              <section className="max-w-7xl mx-auto px-4 mt-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="bg-gray-900/40 border border-gray-800 p-4 rounded-2xl"><span className="text-xs text-gray-400 block mb-1">Saldo Akhir</span><span className={`text-xl font-black ${saldoKas < 0 ? 'text-red-500' : 'text-emerald-400'}`}>Rp {saldoKas.toLocaleString('id-ID')}</span></div>
                  <div className="bg-gray-900/40 border border-gray-800 p-4 rounded-2xl"><span className="text-xs text-gray-400 block mb-1">Total Pemasukan</span><span className="text-xl font-black text-gray-200">Rp {totalUangMasuk.toLocaleString('id-ID')}</span></div>
                  <div className="bg-gray-900/40 border border-gray-800 p-4 rounded-2xl"><span className="text-xs text-gray-400 block mb-1">Total Pengeluaran</span><span className="text-xl font-black text-red-400">Rp {totalUangKeluar.toLocaleString('id-ID')}</span></div>
                  <div className="bg-gray-900/40 border border-gray-800 p-4 rounded-2xl"><span className="text-xs text-gray-400 block mb-1">Total Roster</span><span className="text-xl font-black text-teal-400">{players.length} Pemain</span></div>
                </div>
              </section>

              {/* TABS */}
              <nav className="max-w-7xl mx-auto px-4 my-6">
                <div className="bg-gray-900 p-1.5 rounded-2xl flex flex-wrap gap-1">
                  <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${activeTab === 'dashboard' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400 hover:text-white'}`}>🗓️ RSVP</button>
                  <button onClick={() => setActiveTab('players')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${activeTab === 'players' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400 hover:text-white'}`}>👥 Anggota</button>
                  <button onClick={() => setActiveTab('matchmaker')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${activeTab === 'matchmaker' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400 hover:text-white'}`}>🔥 Tanding</button>
                  <button onClick={() => setActiveTab('ledger')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${activeTab === 'ledger' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400 hover:text-white'}`}>💰 Kas</button>
                  <button onClick={() => setActiveTab('tactical')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${activeTab === 'tactical' ? 'bg-emerald-500 text-gray-950' : 'text-gray-400'}`}>📋 Taktik</button>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-4">
                {/* DASHBOARD / RSVP */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-6">
                    {sessions.map(s => (
                      <div key={s.id} className="bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-xl space-y-6">
                        <div className="border-b border-gray-800 pb-4 mb-4">
                          <span className="text-xs font-bold text-emerald-400 uppercase">Jadwal Skuad</span>
                          <h3 className="text-lg font-bold text-white">Sport Hill Arena - {selectedCourt}</h3>
                          <p className="text-xs text-gray-400">{s.day}, {s.date} | {s.time} WIB</p>
                        </div>
                        <div className="space-y-2 border-t border-gray-800/60 pt-4">
                          <h4 className="text-xs font-bold uppercase text-gray-400 mb-2">Konfirmasi Kehadiran:</h4>
                          {players.map(p => {
                            const status = s.rsvps?.[p.id] || 'NO_RESPONSE';
                            return (
                              <div key={p.id} className="flex justify-between items-center p-2.5 bg-gray-950/40 rounded-xl">
                                <span className="text-sm font-bold text-white">{p.name}</span>
                                <div className="flex gap-1">
                                  <button onClick={() => handleRsvpChange(s.id, p.id, 'YES')} className={`px-2.5 py-1.5 text-xs font-bold rounded-lg ${status === 'YES' ? 'bg-emerald-500 text-gray-950' : 'bg-gray-800 text-gray-400'}`}>Ikut</button>
                                  <button onClick={() => handleRsvpChange(s.id, p.id, 'MAYBE')} className={`px-2.5 py-1.5 text-xs font-bold rounded-lg ${status === 'MAYBE' ? 'bg-yellow-500 text-gray-950' : 'bg-gray-800 text-gray-400'}`}>Ragu</button>
                                  <button onClick={() => handleRsvpChange(s.id, p.id, 'NO')} className={`px-2.5 py-1.5 text-xs font-bold rounded-lg ${status === 'NO' ? 'bg-red-500 text-gray-950' : 'bg-gray-800 text-gray-400'}`}>Absen</button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* PLAYERS */}
                {activeTab === 'players' && (
                  <div className="bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-xl">
                    <h3 className="text-base font-black text-white mb-4">Roster Skuad Badminton Selasa Ceria</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs">
                        <thead>
                          <tr className="bg-gray-950 text-gray-400">
                            <th className="p-4 rounded-l-xl">Nama Lengkap</th>
                            <th className="p-4 text-center">Hak Akses</th>
                            <th className="p-4">Tipe Iuran</th>
                            <th className="p-4">Tarif Kas</th>
                            <th className="p-4 rounded-r-xl">Stats (M/K)</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-800/60">
                          {players.map(p => (
                            <tr key={p.id} className="hover:bg-gray-900/40">
                              <td className="p-4 font-bold text-white">{p.name}</td>
                              <td className="p-4 text-center"><span className="bg-gray-800 px-2 py-1 rounded text-[10px] uppercase">{p.role}</span></td>
                              <td className="p-4 text-gray-400">{p.type === 'monthly' ? 'Bulanan' : 'Per Main'}</td>
                              <td className="p-4 text-emerald-400 font-bold">Rp {p.fee.toLocaleString('id-ID')}</td>
                              <td className="p-4 text-indigo-400 font-mono">{p.stats.won} / {p.stats.lost}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* LEDGER */}
                {activeTab === 'ledger' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl">
                      <h3 className="text-base font-bold text-white mb-4">Catat Mutasi Kas Baru</h3>
                      <form onSubmit={addTransaction} className="space-y-4">
                        <div className="grid grid-cols-2 gap-2">
                          <button type="button" onClick={() => setTxType('credit')} className={`py-1.5 rounded-lg text-xs font-bold border ${txType === 'credit' ? 'border-emerald-500 text-emerald-400 bg-emerald-950/20' : 'border-gray-800 text-gray-400'}`}>Uang Masuk</button>
                          <button type="button" onClick={() => setTxType('debit')} className={`py-1.5 rounded-lg text-xs font-bold border ${txType === 'debit' ? 'border-red-500 text-red-400 bg-red-950/20' : 'border-gray-800 text-gray-400'}`}>Uang Keluar</button>
                        </div>
                        <input type="number" value={txAmount} onChange={(e) => setTxAmount(e.target.value)} placeholder="Jumlah Rp" className="w-full bg-gray-950 border border-gray-800 p-2.5 text-xs text-white rounded-xl" />
                        <input type="text" value={txDesc} onChange={(e) => setTxDesc(e.target.value)} placeholder="Keterangan Nota" className="w-full bg-gray-950 border border-gray-800 p-2.5 text-xs text-white rounded-xl" />
                        <button type="submit" className="w-full py-2.5 bg-emerald-500 text-gray-950 font-bold text-xs rounded-xl hover:bg-emerald-400">Simpan Ke Buku Kas</button>
                      </form>
                    </div>
                    <div className="space-y-3 max-h-[500px] overflow-y-auto pr-1">
                      {transactions.map(t => (
                        <div key={t.id} className="p-4 bg-gray-900 border border-gray-800 rounded-xl flex justify-between items-center">
                          <div>
                            <span className="text-sm font-bold text-white block">{t.description}</span>
                            <span className="text-[10px] text-gray-400">{t.date}</span>
                          </div>
                          <span className={`text-sm font-black ${t.type === 'credit' ? 'text-emerald-400' : 'text-red-400'}`}>Rp {t.amount.toLocaleString('id-ID')}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* MATCHMAKER */}
                {activeTab === 'matchmaker' && (
                  <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl">
                    <h3 className="text-lg font-bold text-white mb-6">Papan Poin Live 21</h3>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-indigo-950/40 p-4 rounded-2xl border border-indigo-900/60 text-center">
                            <span className="text-[10px] font-bold text-indigo-400 uppercase">TIM A</span>
                            <div className="text-5xl font-black text-white py-4">{scoreA}</div>
                            <div className="flex gap-2">
                                <button onClick={() => setScoreA(prev => Math.max(0, prev - 1))} className="flex-1 py-2 bg-gray-800 rounded-xl text-white">-</button>
                                <button onClick={() => setScoreA(prev => prev + 1)} className="flex-1 py-2 bg-indigo-600 rounded-xl text-white">+</button>
                            </div>
                        </div>
                        <div className="bg-red-950/40 p-4 rounded-2xl border border-red-900/60 text-center">
                            <span className="text-[10px] font-bold text-red-400 uppercase">TIM B</span>
                            <div className="text-5xl font-black text-white py-4">{scoreB}</div>
                            <div className="flex gap-2">
                                <button onClick={() => setScoreB(prev => Math.max(0, prev - 1))} className="flex-1 py-2 bg-gray-800 rounded-xl text-white">-</button>
                                <button onClick={() => setScoreB(prev => prev + 1)} className="flex-1 py-2 bg-red-600 rounded-xl text-white">+</button>
                            </div>
                        </div>
                    </div>
                  </div>
                )}

                {/* TACTICAL */}
                {activeTab === 'tactical' && (
                  <div className="flex flex-col lg:flex-row gap-6 bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl items-center justify-center">
                    <div className="w-full lg:w-1/3 space-y-2">
                      <h3 className="text-base font-bold text-white">Strategi Court Planner</h3>
                      <p className="text-xs text-gray-400">Geser titik pemain untuk menyusun posisi tim.</p>
                    </div>
                    <canvas ref={canvasRef} width="300" height="400" className="border border-gray-800 rounded-2xl bg-emerald-950 shadow-2xl" />
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
